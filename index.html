<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DNS Operational Site List</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        :root {
            --primary: #0056b3;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-main: #333;
            --text-muted: #666;
            --border-radius: 8px;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 16px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            font-size: 22px;
            margin-bottom: 20px;
            color: var(--primary);
        }
        .search-box {
            position: relative;
            margin-bottom: 20px;
        }
        input[type="text"] {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: var(--border-radius);
            box-sizing: border-box;
            outline: none;
            transition: all 0.3s ease;
        }
        input[type="text"]:focus {
            border-color: var(--primary);
            box-shadow: 0 0 5px rgba(0, 86, 179, 0.3);
        }
        .suggestions {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: #fff;
            border: 1px solid #ccc;
            border-top: none;
            border-radius: 0 0 var(--border-radius) var(--border-radius);
            max-height: 250px;
            overflow-y: auto;
            z-index: 10;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: none;
        }
        .suggestion-item {
            padding: 12px 14px;
            cursor: pointer;
            border-bottom: 1px solid #eee;
        }
        .suggestion-item:last-child {
            border-bottom: none;
        }
        .suggestion-item:hover {
            background-color: #f0f8ff;
        }
        .suggestion-item strong {
            display: block;
            font-size: 16px;
            color: var(--primary);
        }
        .suggestion-item small {
            color: var(--text-muted);
            font-size: 13px;
        }
        .card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: var(--border-radius);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            display: none;
            animation: fadeIn 0.3s;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .card h2 {
            margin-top: 0;
            font-size: 18px;
            border-bottom: 1px solid #eee;
            padding-bottom: 12px;
            margin-bottom: 15px;
            color: var(--primary);
        }
        .detail-row {
            margin-bottom: 14px;
            display: flex;
            flex-direction: column;
        }
        .detail-row span.label {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }
        .detail-row span.value {
            font-size: 15px;
            font-weight: 500;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 25px;
        }
        .btn {
            flex: 1;
            padding: 14px;
            text-align: center;
            border-radius: var(--border-radius);
            text-decoration: none;
            color: #fff;
            font-weight: bold;
            font-size: 16px;
            display: inline-block;
            transition: opacity 0.2s;
        }
        .btn:hover { opacity: 0.9; }
        .btn-call { background-color: #28a745; }
        .btn-nav { background-color: #007bff; }
        .loading { text-align: center; font-style: italic; color: var(--text-muted); display: none; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h1>DNS Operational Site List</h1>
    <div id="loading" class="loading">Loading data... Please wait.</div>
    
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Type Site ID or Site Name..." autocomplete="off">
        <div id="suggestions" class="suggestions"></div>
    </div>

    <div id="resultCard" class="card">
        <h2 id="cardTitle">Site Name</h2>
        
        <div class="detail-row">
            <span class="label">District & Depot</span>
            <span class="value" id="valDistrictDepot"></span>
        </div>
        
        <div class="detail-row">
            <span class="label">Depot Officer (FME_ID)</span>
            <span class="value" id="valOfficer"></span>
        </div>

        <div class="detail-row">
            <span class="label">Depot Contact</span>
            <span class="value" id="valContact"></span>
        </div>

        <div class="detail-row">
            <span class="label">Coordinates</span>
            <span class="value" id="valLatLon"></span>
        </div>

        <div class="detail-row">
            <span class="label">Tower Details (Category / Type)</span>
            <span class="value" id="valTowerDetails"></span>
        </div>

        <div class="detail-row">
            <span class="label">Tower Owner</span>
            <span class="value" id="valOwner"></span>
        </div>

        <div class="btn-group">
            <a href="#" id="btnCall" class="btn btn-call">📞 Call</a>
            <a href="#" id="btnNav" class="btn btn-nav" target="_blank">🗺️ Navigate</a>
        </div>
    </div>
</div>

<script>
    // Make sure your uploaded file is strictly named data.csv
    const CSV_FILE = 'data.csv'; 
    let siteData = [];

    const searchInput = document.getElementById('searchInput');
    const suggestionsBox = document.getElementById('suggestions');
    const resultCard = document.getElementById('resultCard');
    const loadingText = document.getElementById('loading');

    // Load CSV data automatically using PapaParse
    loadingText.style.display = 'block';
    Papa.parse(CSV_FILE, {
        download: true,
        header: true,
        skipEmptyLines: true,
        complete: function(results) {
            siteData = results.data;
            loadingText.style.display = 'none';
        },
        error: function(err) {
            console.error("Error loading CSV:", err);
            loadingText.innerText = "Error loading data. Make sure data.csv is uploaded in the repository.";
        }
    });

    // Handle Input & Auto-Suggest
    searchInput.addEventListener('input', function() {
        const query = this.value.toLowerCase().trim();
        suggestionsBox.innerHTML = '';
        
        if (query.length < 2) {
            suggestionsBox.style.display = 'none';
            return;
        }

        // Filter based on Site ID or Site Name
        const matches = siteData.filter(item => {
            const siteId = (item['Site_ID'] || '').toLowerCase();
            const siteName = (item['Site_Name'] || '').toLowerCase();
            return siteId.includes(query) || siteName.includes(query);
        }).slice(0, 10); // Display max 10 matches to keep UI clean

        if (matches.length > 0) {
            matches.forEach(match => {
                const div = document.createElement('div');
                div.className = 'suggestion-item';
                div.innerHTML = `<strong>${match['Site_ID']}</strong><small>${match['Site_Name']}</small>`;
                div.onclick = () => selectSite(match);
                suggestionsBox.appendChild(div);
            });
            suggestionsBox.style.display = 'block';
        } else {
            suggestionsBox.style.display = 'none';
        }
    });

    // Hide suggestions when tapping outside the box
    document.addEventListener('click', function(e) {
        if (e.target !== searchInput) {
            suggestionsBox.style.display = 'none';
        }
    });

    // Populate card when a suggestion is clicked
    function selectSite(site) {
        searchInput.value = `${site['Site_ID']} - ${site['Site_Name']}`;
        suggestionsBox.style.display = 'none';
        displayResult(site);
    }

    function displayResult(site) {
        document.getElementById('cardTitle').innerText = `${site['Site_Name']} (${site['Site_ID']})`;
        
        document.getElementById('valDistrictDepot').innerText = `${site['District'] || 'N/A'} / ${site['Depot'] || 'N/A'}`;
        document.getElementById('valOfficer').innerText = site['Depot_officer(FME_ID)'] || 'N/A';
        document.getElementById('valContact').innerText = site['Depot_Contact'] || 'N/A';
        document.getElementById('valLatLon').innerText = `${site['Latitude'] || 'N/A'}, ${site['Longitude'] || 'N/A'}`;
        
        document.getElementById('valTowerDetails').innerText = `${site['Tower_Category'] || 'N/A'} / ${site['Tower_Type'] || 'N/A'}`;
        document.getElementById('valOwner').innerText = site['Tower_Owner'] || 'N/A';

        // Functional Action Buttons
        const contactNum = site['Depot_Contact'];
        const lat = site['Latitude'];
        const lon = site['Longitude'];

        const btnCall = document.getElementById('btnCall');
        if (contactNum && contactNum !== 'N/A') {
            btnCall.href = `tel:${contactNum}`;
            btnCall.style.display = 'inline-block';
        } else {
            btnCall.style.display = 'none';
        }

        const btnNav = document.getElementById('btnNav');
        if (lat && lon && lat !== 'N/A' && lon !== 'N/A') {
            btnNav.href = `https://www.google.com/maps/dir/?api=1&destination=${lat},${lon}`;
            btnNav.style.display = 'inline-block';
        } else {
            btnNav.style.display = 'none';
        }

        resultCard.style.display = 'block';
    }
</script>

</body>
</html>
